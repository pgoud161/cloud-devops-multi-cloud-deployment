apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-cloud-devops-ingress
  namespace: cloud-devops
  labels:
    app: fastapi-cloud-devops
  annotations:
    # NGINX ingress controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # cert-manager for TLS (install cert-manager separately)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.cloud-devops.example.com
      secretName: fastapi-tls-secret
  rules:
    - host: api.cloud-devops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastapi-cloud-devops-svc
                port:
                  number: 80
