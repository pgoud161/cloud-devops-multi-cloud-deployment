apiVersion: v1
kind: Service
metadata:
  name: fastapi-cloud-devops-svc
  namespace: cloud-devops
  labels:
    app: fastapi-cloud-devops
  annotations:
    # AWS NLB annotation (used when deploying on EKS)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # Azure annotation (used when deploying on AKS)
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
spec:
  selector:
    app: fastapi-cloud-devops
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP     # Ingress controller handles external traffic
